<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>特別展「百万石！加賀前田家」ハイライト</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        header { background: #1a365d; color: white; padding: 40px; text-align: center; border-bottom: 8px solid #c53030; }
        .container { max-width: 1000px; margin: 40px auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card h3 { color: #2d3748; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .symbol { color: #e53e3e; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>特別展「百万石！加賀前田家」</h1>
        <p>主要出品作品データプロジェクト</p>
    </header>
    <div class="container">
        <div class="card">
            <h3><span class="symbol">●</span> 金小札白糸素懸威胴丸具足</h3>
            <p>国宝。前田利家公の象徴的な甲冑です。</p>
        </div>
        <div class="card">
            <h3><span class="symbol">●</span> 太刀 銘光世作（名物大典太）</h3>
            <p>国宝。天下五剣の一つ、前田家第一の家宝。</p>
        </div>
        <div class="card">
            <h3><span class="symbol">●</span> 宝積経要品</h3>
            <p>国宝。足利尊氏らによる合筆の貴重な経本。</p>
        </div>
    </div>
    <div style="text-align: center; padding: 40px;">
        <p>※詳細はPDFリストをご確認ください。</p>
    </div>
</body>
</html>
